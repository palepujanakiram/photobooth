name: Build
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

# Sonar PR decoration and new-code detection need full git history (not depth=1).
permissions:
  contents: read

defaults:
  run:
    working-directory: photobooth

jobs:
  sonarqube:
    name: SonarQube
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Java (required for Android builds)
        uses: actions/setup-java@v4.7.0
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter SDK
        uses: flutter-actions/setup-flutter@v4.2
        with:
          channel: stable
          cache: true
          cache-key: 'flutter-{platform}-{channel}-{architecture}-{hash}'

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Build App
        run: flutter build apk

      # Monorepo: sonar-project.properties lives under photobooth/.
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6.0.0
        with:
          projectBaseDir: photobooth
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
