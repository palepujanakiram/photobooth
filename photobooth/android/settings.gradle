pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        file("local.properties").withInputStream { properties.load(it) }
        def flutterSdkPath = properties.getProperty("flutter.sdk")
        assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
        return flutterSdkPath
    }()

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }

}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version '9.3.0' apply false
    // Per-module built-in Kotlin (AGP 9): enabled for :app only. Global
    // android.builtInKotlin stays false because some transitive plugins still ship legacy KGP.
    id "com.android.built-in-kotlin" version '9.3.0' apply false
    // START: FlutterFire Configuration
    id "com.google.gms.google-services" version "4.4.0" apply false
    // END: FlutterFire Configuration
    id "org.jetbrains.kotlin.android" version "2.3.20" apply false
}

include ":app"

