name: photobooth
description: A Flutter photo booth application with AI transformations
publish_to: 'none'
# Release version: YEAR.MONTH.DAY+buildNumber (see tool/sync_build_version.dart).
# iOS Fastlane queries App Store Connect for the latest build on that version, then +1.
# Android Fastlane queries Google Play for the highest version code (all tracks), then +1.
# Local `dart run tool/sync_build_version.dart` increments the +suffix in pubspec.
# Cursor/VS Code: Run Task → "flutter build apk (release)" (runs prebuild: sync version first).
# CLI: ./scripts/flutter_with_version.sh build web   (plain `flutter build web` does not sync)
#      dart run tool/sync_build_version.dart
version: 2026.7.2+2
environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  web: ^1.1.0

  # State Management
  provider: ^6.1.1

  # Camera (^0.11.4+ ensures camera_android_camerax 0.6.30+ for external/USB camera on Android TV)
  camera: ^0.11.4
  # USB/UVC camera (Android only). Used when CameraX cannot enumerate external cameras.
  uvccamera: ^0.0.13
  camera_native_details:
    path: packages/camera_native_details
  image_picker: ^1.0.7

  # HTTP Client
  dio: ^5.4.0
  http: ^1.1.2
  retrofit: ^4.4.1
  json_annotation: ^4.8.1
  
  # Image Processing
  image: ^4.1.3
  # On-device face count: ML Kit (Android), Apple Vision (iOS — simulator-safe).
  face_count:
    path: packages/face_count

  # File Operations
  path_provider: ^2.1.1
  path: ^1.8.3

  # Permissions
  permission_handler: ^12.0.1

  # Sharing
  share_plus: ^11.0.0
  cross_file: ^0.3.3

  # Printing
  printing: ^5.12.0

  # Utilities
  package_info_plus: ^8.0.0
  device_info_plus: ^10.1.0
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.2.4
  uuid: ^4.2.1
  pdf: ^3.11.3
  url_launcher: ^6.2.2
  webview_flutter: ^4.4.2
  bugsnag_flutter: ^4.2.0
  flutter_alice: ^2.0.1
  overlay_support: ^2.1.0
  firebase_core: ^4.6.0
  firebase_messaging: ^16.1.3
  flutter_zxing: ^2.2.1
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  camera_platform_interface: ^2.11.0
  http_mock_adapter: ^0.6.1
  flutter_lints: ^3.0.1
  retrofit_generator: ^9.1.4
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  flutter_launcher_icons: ^0.13.1

# Vendored fork: preview/ImageAnalysis use one preset lower than capture to cut
# preview RAM; ImageCapture keeps full [ResolutionPreset] (see package README).
dependency_overrides:
  camera_android_camerax:
    path: packages/camera_android_camerax

flutter:
  config:
    enable-swift-package-manager: true
  uses-material-design: true

  assets:
    - lib/images/
    - assets/slideshow/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "lib/images/fotozen_app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "lib/images/fotozen_app_icon.png"
  web:
    generate: true
    image_path: "lib/images/fotozen_app_icon.png"
    background_color: "#FFFFFF"
    theme_color: "#0088CC"

