server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Entry HTML/JS must revalidate — Flutter ships fixed filenames (main.dart.js).
    # Long-lived immutable caching here caused stale UI after redeploys.
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    location = /flutter_bootstrap.js {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    location = /main.dart.js {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|wasm)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        application/wasm
        image/svg+xml;
}
