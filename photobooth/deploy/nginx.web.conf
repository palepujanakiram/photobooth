# Flutter web static host + same-origin API reverse proxy.
#
# Browser calls https://fotozen-web.fly.dev/api/* (no CORS). nginx forwards to the
# Fly API app. Build with: --dart-define=BASE_URL=https://fotozen-web.fly.dev

resolver 8.8.8.8 1.1.1.1 valid=300s ipv6=off;
resolver_timeout 5s;

# Upstream API (override at deploy time via fly secrets / env if needed).
map $http_host $api_upstream_host {
    default fotozenai.fly.dev;
}

server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 50m;

    # Theme sample images and other object storage paths live on the API host.
    location /objects/ {
        proxy_pass https://$api_upstream_host;
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header Host $api_upstream_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering on;
        proxy_cache off;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_connect_timeout 30s;
    }

    # API reverse proxy — same-origin for Flutter web.
    location /api/ {
        proxy_pass https://$api_upstream_host;
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header Host $api_upstream_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 30s;
    }

    # Legacy + legal pages served by the API static host.
    location = /terms {
        proxy_pass https://$api_upstream_host;
        proxy_ssl_server_name on;
        proxy_set_header Host $api_upstream_host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /accept-terms {
        proxy_pass https://$api_upstream_host;
        proxy_ssl_server_name on;
        proxy_set_header Host $api_upstream_host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /ai-transform {
        proxy_pass https://$api_upstream_host;
        proxy_ssl_server_name on;
        proxy_set_header Host $api_upstream_host;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 50m;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Entry HTML/JS must revalidate — Flutter ships fixed filenames (main.dart.js).
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    location = /flutter_bootstrap.js {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    location = /main.dart.js {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|wasm)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        application/wasm
        image/svg+xml;
}
