sonar.projectKey=palepujanakiram_photobooth
sonar.organization=palepujanakiram

# Paths are relative to this file (photobooth/).
sonar.sources=lib
sonar.tests=test
sonar.sourceEncoding=UTF-8
sonar.dart.lcov.reportPaths=coverage/lcov.info

# Generated / vendored code
sonar.exclusions=**/*.g.dart,**/*.freezed.dart,**/GeneratedPluginRegistrant.java,packages/camera_android_camerax/**

# UI shells and platform stubs — cover ViewModels/services/utils in tests instead
sonar.coverage.exclusions=**/*.g.dart,lib/main.dart,**/file_helper_*.dart,lib/screens/**/*_view.dart,lib/views/**

# Disable C / C++ / Objective-C analysis
sonar.c.file.suffixes=-
sonar.cpp.file.suffixes=-
sonar.objc.file.suffixes=-
