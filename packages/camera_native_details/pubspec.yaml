name: camera_native_details
description: Flutter plugin to get native camera characteristics (Android Camera2, stubs for iOS/Web).
version: 0.0.1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: com.photobooth.camera_native_details
        pluginClass: CameraNativeDetailsPlugin
      ios:
        pluginClass: CameraNativeDetailsPlugin
      web:
        pluginClass: CameraNativeDetailsWeb
        fileName: camera_native_details_web.dart
