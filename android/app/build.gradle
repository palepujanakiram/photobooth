plugins {
    id "com.android.application"
    // START: FlutterFire Configuration
    id 'com.google.gms.google-services'
    id 'com.google.firebase.crashlytics'
    // END: FlutterFire Configuration
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

// App name used for APK output (e.g. photobooth-release.apk instead of app-release.apk)
def appName = "photobooth"

android {
    namespace "com.srisarani.fotozenai"
    compileSdk 36
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
        // Enable core library desugaring for flutter_local_notifications
        coreLibraryDesugaringEnabled true
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.srisarani.fotozenai"
        minSdkVersion rootProject.hasProperty('flutter.minSdkVersion')
            ? rootProject.property('flutter.minSdkVersion').toInteger()
            : flutter.minSdkVersion
        targetSdkVersion flutter.targetSdkVersion
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        setProperty("archivesBaseName", appName)
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
        }
    }

    applicationVariants.all { variant ->
        variant.outputs.all { output ->
            output.outputFileName = "${appName}-${variant.buildType.name}.apk"
        }
    }
}

// Copy renamed APK to flutter-apk so it's available as {appname}-release.apk where Flutter reports output
tasks.whenTaskAdded { task ->
    if (task.name == "assembleRelease") {
        task.doLast {
            def apkDir = file("${project.buildDir}/outputs/apk/release")
            def flutterApkDir = file("${project.buildDir}/outputs/flutter-apk")
            def srcApk = file("${apkDir}/${appName}-release.apk")
            if (srcApk.exists()) {
                flutterApkDir.mkdirs()
                copy {
                    from srcApk
                    into flutterApkDir
                }
            }
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    // Firebase Messaging + BoM are provided by FlutterFire (firebase_messaging / firebase_core)
    // at versions compatible with this project’s Gradle; do not pin an older BoM or
    // firebase-messaging-ktx here — newer BoMs may omit the separate ktx artifact line.
    implementation 'com.bugsnag:bugsnag-android:6.+'
    // Core library desugaring for Java 8+ APIs on older Android versions
    // Required by flutter_local_notifications (version 2.1.4+)
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'
}

